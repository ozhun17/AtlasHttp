name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: self-hosted-linux
            os: ubuntu-latest
            triplet: x64-linux
            compiler: gcc
          - runner: macos-latest
            os: macos-latest
            triplet: arm64-osx
            compiler: clang
          - runner: self-hosted-windows
            os: windows-latest
            triplet: x64-windows
            compiler: msvc

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        token: ${{ secrets.PAT_TOKEN }}

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '256acc64012b23a13041d8705805e1f23b43a024'

    - name: Install latest CMake
      if: matrix.os == 'macos-latest'
      run: |
        pip install --upgrade cmake
      shell: bash

    - name: Configure CMake (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
      shell: bash

    - name: Configure CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=MinSizeRel `
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
      shell: pwsh

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: cmake --build build --config MinSizeRel
      shell: pwsh

    - name: Build (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: cmake --build build --config MinSizeRel
      shell: bash

    - name: Start server and test /ready endpoint
      run: |
        # Start the server in background
        $process = Start-Process -FilePath ".\build\example\MinSizeRel\AtlasHttpExample.exe" -PassThru
        $processId = $process.Id
        
        # Give server time to start
        Start-Sleep -Seconds 2
        
        try {
          # Test the /ready endpoint
          $response = Invoke-WebRequest -Uri "http://127.0.0.1:1411/ready" -Method GET
          
          # Verify response
          if ($response.StatusCode -eq 200) {
            Write-Output "✓ Server is ready and responding correctly"
            Write-Output "Response: $($response.Content)"
          } else {
            Write-Output "✗ Unexpected status code: $($response.StatusCode)"
            exit 1
          }
        } finally {
          # Send SIGTERM to gracefully shut down the server
          Write-Output "Sending SIGTERM to process $processId"
          Stop-Process -Id $processId -ErrorAction SilentlyContinue
        }
      shell: pwsh
      timeout-minutes: 2
      if: matrix.os == 'windows-latest'

    - name: Start server and test /ready endpoint (Linux/macOS)
      run: |
        # Start the server in background
        ./build/example/AtlasHttpExample &
        PID=$!
        
        sleep 2
        
        trap "kill -TERM $PID 2>/dev/null" EXIT
        
        # Test the /ready endpoint
        RESPONSE=$(curl -s -w "\n%{http_code}" http://127.0.0.1:1411/ready)
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        
        # Verify response
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✓ Server is ready and responding correctly"
          echo "Response: $BODY"
        else
          echo "✗ Unexpected status code: $HTTP_CODE"
          exit 1
        fi
      shell: bash
      timeout-minutes: 2
      if: matrix.os != 'windows-latest'
